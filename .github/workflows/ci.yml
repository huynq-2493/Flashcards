name: CI

on:
  push:
    branches: [main, 'feat/**', '[0-9]+-**']
  pull_request:

jobs:
  backend:
    name: Backend — lint / typecheck / test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flashcards
          POSTGRES_PASSWORD: flashcards
          POSTGRES_DB: flashcards_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://flashcards:flashcards@localhost:5432/flashcards_test
      JWT_SECRET: ci-test-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=backend

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy --schema=src/prisma/schema.prisma

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Type-check
        working-directory: backend
        run: npm run typecheck

      - name: Unit & integration tests
        working-directory: backend
        run: npm run test

  frontend:
    name: Frontend — lint / typecheck / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=frontend

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type-check
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build
